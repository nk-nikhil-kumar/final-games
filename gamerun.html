<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="description" content="Play the best free online games instantly on The Playhub. Action, Puzzle, Arcade and 3D browser games. No download required.">
    <meta name="keywords" content="free online games, browser games, play games online, webgl games, no download games">

    <title>The PlayHub | Playing Game</title>
    <!-- Favicon -->
    <link rel="icon" href="finallogo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6a1fb5;
            --purple2: #9b5de5;
            --bg: #ffffff;
            --soft: #f7f5fb;
            --radius: 20px;
            --glass: rgba(255, 255, 255, 0.78);
            --ink: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* [CHANGE] Body overflow allows scrolling now for description */
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--soft);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; 
        }

        /* [CHANGE] Header ko slim (44px) kar diya taaki game upar shift ho jaye */
        header {
            height: 60px;
            padding: 0 24px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo-container { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: url("finallogo.png") center/185% no-repeat;
            box-shadow: 0 8px 15px rgba(106,31,181,.15);
        }
        .logo-text b { color: #111; font-size: 16px; }

        /* [CHANGE] Player section flexible height with padding for scrolling */
        .player-section {
            flex: 1;
            padding: 20px 15px 60px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: var(--soft);
        }

        /* [CHANGE] Game Wrapper fixed viewport height based logic */
        .game-wrapper {
            width: min(1200px, 100%);
            height: 75vh;
            min-height: 480px;
            background: #000;
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 4px solid #fff;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* [NEW] Social Action Bar - Game ke theek niche */
        .action-bar {
            width: min(1200px, 100%);
            background: #fff;
            padding: 12px 24px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .left-actions, .right-actions { display: flex; gap: 15px; align-items: center; }

        .btn-action {
            background: var(--soft);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-action:hover { background: #e8e4f0; transform: translateY(-2px); }
        .btn-action svg { width: 18px; height: 18px; fill: var(--purple); }

        .btn-share {
            background: linear-gradient(90deg, var(--purple), var(--purple2));
            color: #fff;
        }
        .btn-share svg { fill: #fff; }

        @media (max-width: 768px) {
            .action-bar { padding: 8px; }
            .btn-action span { display: none; } /* Mobile pe sirf icons dikhenge */
        }

        /* [NEW] Game Description Box */
        .game-description {
            width: min(1200px, 100%);
            background: #fff;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            color: #444;
            line-height: 1.8;
            font-size: 16px;
            margin-top: 5px;
        }

        .game-description h2 {
            color: var(--ink);
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: 800;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-container">
            <div class="logo-icon"></div>
            <div class="logo-text"><b>The PlayHub</b></div>
        </a>
        <a href="index.html" style="text-decoration:none; color:var(--purple); font-weight:600; font-size:14px;">← Back</a>
    </header>

    <main class="player-section">
        <div class="game-wrapper">
            <iframe id="mainGameFrame" src="" allowfullscreen></iframe>
        </div>

        <div class="action-bar">
            <div class="left-actions">
                <button class="btn-action">
                    <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                    <span>1.2k</span>
                </button>
                <button class="btn-action">
                    <svg viewBox="0 0 24 24" style="transform: rotate(180deg);"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                    <span>Dislike</span>
                </button>
            </div>

            <div class="right-actions">
                <button class="btn-action">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span>Comments</span>
                </button>
                <button class="btn-action btn-share">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                    <span>Share</span>
                </button>
            </div>
        </div>

        <div class="game-description" id="gameDescriptionBox">
            <h2 id="gameTitle">Game Description</h2>
            <p id="gameDescText">Loading description...</p>
        </div>
    </main>

    <script>z
        // Descriptions Database (Random text specific to each game)
        const gameData = {
            '15602139': { title: "Winderness 100", desc: "Explore a vast open world in this immersive 3D adventure. Navigate carefully through the treacherous paths, gather resources, and conquer the wilderness. Will you survive the ultimate 100-level challenge? Experience thrilling gameplay, dynamic environments, and intense action in every single moment!" },
            '16777369': { title: "Numeral Horde Survival", desc: "Survive endless waves of enemies using the power of numbers. Strategize your upgrades, aim perfectly, and defend your base from the massive numeric invasion. A perfect blend of mechanics and mathematics to keep your brain and reflexes sharp!" },
            '16506276': { title: "Maze Escape", desc: "Navigate through intricate puzzles and find your way out of the complex maze before time runs out. Mind-bending challenges await you around every corner. Keep your eyes open, track your steps, and don't get lost in the endless loops!" },
            '16509341': { title: "Aim Challenge", desc: "Test your fast reflexes and precision shooting in this action-packed challenge. Hit every target, avoid the penalties, and achieve the highest score possible. Train your aim and become the ultimate marksman!" },
            '16366206': { title: "Ninja Sprint / Teacher Rush", desc: "Dash, jump, and slash your way through difficult obstacles. Use your stealth, fast speed, and quick thinking to complete each level as fast as possible. A fun, casual yet highly competitive browser game!" },
            '16375403': { title: "Titan Simulator", desc: "Take control of a massive titan! Experience epic scale, destructive movements, and thrilling 3D physics in this ultimate simulation. Stomp around, swing powerful hits, and cause absolute cinematic chaos!" }
        };

        function populateDescription(url) {
            let foundTitle = "Featured Game";
            let foundDesc = "Welcome to this amazing game on The PlayHub! Enjoy immersive gameplay, stunning visuals, and endless entertainment. Play now, explore different levels, and challenge your friends to beat your high score. Get ready for an unforgettable and thrilling gaming experience straight from your browser!";
            
            if (url) {
                for (let key in gameData) {
                    if (url.includes(key)) {
                        foundTitle = gameData[key].title;
                        foundDesc = gameData[key].desc;
                        break;
                    }
                }
            }
            document.getElementById('gameTitle').innerText = foundTitle + " - Description";
            document.getElementById('gameDescText').innerText = foundDesc;
        }

        // Script to run game and populate description
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('gameSrc');
        if (gameUrl) {
            const decodedUrl = decodeURIComponent(gameUrl);
            document.getElementById('mainGameFrame').src = decodedUrl;
            populateDescription(decodedUrl);
        } else {
            window.location.href = "index.html";
        }

        // --- LIKE & DISLIKE SYSTEM WITH TOGGLE & REAL-TIME UI ---

async function initInteractions() {
    const likeBtn = document.querySelector('.left-actions .btn-action:first-child');
    const dislikeBtn = document.querySelector('.left-actions .btn-action:nth-child(2)');
    
    const likeText = likeBtn.querySelector('span');
    const dislikeText = dislikeBtn.querySelector('span');

    // 1. IP Fetch for Unique Identity
    let userIp = "";
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        userIp = data.ip;
    } catch (e) { userIp = "user_local"; }

    // 2. Data Load (Initial Counts)
    let likes = parseInt(localStorage.getItem('total_likes')) || 1200;
    let dislikes = parseInt(localStorage.getItem('total_dislikes')) || 45;

    // Initial Display Update
    const updateUI = () => {
        likeText.innerText = likes >= 1000 ? (likes / 1000).toFixed(1) + "k" : likes;
        dislikeText.innerText = dislikes; // Dislike usually simple numbers mein acche lagte hain
        
        // Active Styles
        likeBtn.style.color = localStorage.getItem('liked_' + userIp) ? "var(--purple)" : "inherit";
        likeBtn.style.background = localStorage.getItem('liked_' + userIp) ? "#eeeaff" : "var(--soft)";
        
        dislikeBtn.style.color = localStorage.getItem('disliked_' + userIp) ? "#ff4757" : "inherit";
        dislikeBtn.style.background = localStorage.getItem('disliked_' + userIp) ? "#fff0f0" : "var(--soft)";
    };

    updateUI();

    // 3. Like Click Logic
    likeBtn.onclick = () => {
        const hasLiked = localStorage.getItem('liked_' + userIp);
        
        if (!hasLiked) {
            likes++;
            localStorage.setItem('liked_' + userIp, true);
            // Agar dislike kiya tha toh use hatao (Standard UX)
            if(localStorage.getItem('disliked_' + userIp)) {
                dislikes--;
                localStorage.removeItem('disliked_' + userIp);
            }
            animateButton(likeBtn, "up");
        } else {
            // [TOGGLE] Wapas click kiya toh like hata do
            likes--;
            localStorage.removeItem('liked_' + userIp);
            animateButton(likeBtn, "down");
        }
        
        localStorage.setItem('total_likes', likes);
        localStorage.setItem('total_dislikes', dislikes);
        updateUI();
    };

    // 4. Dislike Click Logic
    dislikeBtn.onclick = () => {
        const hasDisliked = localStorage.getItem('disliked_' + userIp);
        
        if (!hasDisliked) {
            dislikes++;
            localStorage.setItem('disliked_' + userIp, true);
            // Agar like kiya tha toh use hatao
            if(localStorage.getItem('liked_' + userIp)) {
                likes--;
                localStorage.removeItem('liked_' + userIp);
            }
            animateButton(dislikeBtn, "up");
        } else {
            // [TOGGLE] Wapas click kiya toh dislike hata do
            dislikes--;
            localStorage.removeItem('disliked_' + userIp);
            animateButton(dislikeBtn, "down");
        }
        
        localStorage.setItem('total_likes', likes);
        localStorage.setItem('total_dislikes', dislikes);
        updateUI();
    };
}

// [NEW] Advanced Animation Function
function animateButton(btn, type) {
    btn.style.transition = "all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
    
    if (type === "up") {
        btn.style.transform = "scale(1.4) translateY(-5px) rotate(-10deg)";
        setTimeout(() => btn.style.transform = "scale(1) translateY(0) rotate(0deg)", 250);
    } else {
        btn.style.transform = "scale(0.8) translateY(2px)";
        setTimeout(() => btn.style.transform = "scale(1) translateY(0)", 250);
    }
}

initInteractions();

// --- ADVANCED SHARE SYSTEM (COPY + FLOATING TOAST) ---

const shareBtn = document.querySelector('.btn-share');

shareBtn.onclick = async () => {
    // 1. Current Page ka URL pakdo
    const currentUrl = window.location.href;

    try {
        // 2. Clipboard mein copy karo
        await navigator.clipboard.writeText(currentUrl);

        // 3. Floating "Toast" Element banao (Dynamic UI)
        const toast = document.createElement('div');
        toast.innerText = "Link Copied! 🚀";
        
        // --- TOAST STYLING (CSS via JS) ---
        Object.assign(toast.style, {
            position: 'absolute',
            bottom: '70px', // Button ke theek upar
            left: '50%',
            transform: 'translateX(-50%) translateY(20px)',
            background: 'var(--purple)',
            color: 'white',
            padding: '8px 16px',
            borderRadius: '12px',
            fontSize: '13px',
            fontWeight: '600',
            boxShadow: '0 10px 25px rgba(106,31,181,0.3)',
            opacity: '0',
            transition: 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
            zIndex: '100',
            whiteSpace: 'nowrap'
        });

        // Button ke parent (Action Bar) mein daalo taaki position sahi rahe
        shareBtn.parentElement.style.position = 'relative';
        shareBtn.parentElement.appendChild(toast);

        // --- ANIMATION START ---
        setTimeout(() => {
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
        }, 10);

        // 4. Button Bounce Animation
        shareBtn.style.transform = "scale(0.9)";
        setTimeout(() => shareBtn.style.transform = "scale(1)", 150);

        // 5. 2 Second baad Toast ko hata do (Fade out)
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(-10px)';
            setTimeout(() => toast.remove(), 400);
        }, 2000);

    } catch (err) {
        console.error("Copy fail ho gaya", err);
    }
};
    </script>
